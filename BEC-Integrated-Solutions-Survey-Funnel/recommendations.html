<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEC Integrated Solutions | Recommendation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bec-navy: #0b1f3a;
            --bec-blue: #0f4c81;
            --bec-red: #d2232a;
            --bec-gold: #f5b342;
            --bec-ink: #10253d;
            --bec-text: #2d3d52;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--bec-text);
            background: linear-gradient(135deg, #f6f9fd 0%, #eef3f8 45%, #ffffff 100%);
        }
        .panel {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(16,37,61,0.1);
            box-shadow: 0 28px 60px rgba(11,31,58,0.12);
            backdrop-filter: blur(18px);
        }
        .btn-primary {
            background: linear-gradient(90deg, var(--bec-blue), var(--bec-red));
            color: #fff;
            box-shadow: 0 12px 28px rgba(11,31,58,0.22);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.96);
            border: 1px solid rgba(15, 76, 129, 0.18);
            color: var(--bec-blue);
        }
        .accent-line { height: 4px; border-radius: 999px; background: linear-gradient(90deg, var(--bec-blue), var(--bec-red), var(--bec-gold)); }
        .muted { color: #526476; }
        .label { color: #5d6f84; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-white to-slate-200 text-slate-800">
    <main class="mx-auto flex min-h-screen max-w-5xl items-center px-4 py-10 sm:px-6 lg:px-8">
        <section class="panel w-full rounded-[2rem] p-6 sm:p-8 lg:p-10">
            <div class="accent-line"></div>
            <div class="mt-6 text-center">
                <p class="text-xs font-bold uppercase tracking-[0.28em] text-slate-500">BEC Recommendation</p>
                <h1 id="rec-title" class="mt-3 text-4xl font-black text-[var(--bec-ink)] sm:text-5xl">Loading recommendation...</h1>
                <p id="rec-copy" class="mx-auto mt-4 max-w-3xl text-base leading-7 muted"></p>
            </div>

            <div class="mt-8 grid gap-4 sm:grid-cols-3">
                <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <p class="label text-xs font-semibold uppercase tracking-[0.18em]">Wireless fit</p>
                    <p id="fit-score" class="mt-2 text-2xl font-black text-[var(--bec-ink)]">0</p>
                </div>
                <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <p class="label text-xs font-semibold uppercase tracking-[0.18em]">Integration fit</p>
                    <p id="integration-score" class="mt-2 text-2xl font-black text-[var(--bec-ink)]">0</p>
                </div>
                <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <p class="label text-xs font-semibold uppercase tracking-[0.18em]">Budget fit</p>
                    <p id="budget-score" class="mt-2 text-2xl font-black text-[var(--bec-ink)]">0</p>
                </div>
            </div>

            <div class="mt-8 rounded-[1.5rem] border border-slate-200 bg-white p-5">
                <h2 class="text-sm font-bold uppercase tracking-[0.2em] text-slate-500">Your Answers</h2>
                <div id="answer-list" class="mt-4 grid gap-3"></div>
            </div>

            <div class="mt-8 grid gap-3 sm:grid-cols-3">
                <a href="index.html" class="btn-secondary rounded-full px-5 py-3 text-center text-sm font-bold">Back to Survey</a>
                <a href="checkout.html" class="btn-primary rounded-full px-5 py-3 text-center text-sm font-bold">Continue to Quote</a>
                <a href="https://becintegrated.com/contacts/" target="_blank" rel="noopener" class="rounded-full border border-slate-200 bg-white px-5 py-3 text-center text-sm font-bold text-slate-700">Contact BEC</a>
            </div>
        </section>
    </main>

    <script>
        const recommendation = JSON.parse(localStorage.getItem('becRecommendation') || 'null');
        const titles = {
            a: 'MV200 Wireless Nurse Call Kits',
            b: 'MV500 Wireless Nurse Call System',
            c: 'PC-Based Wireless Nurse Call Platform'
        };

        const descriptions = {
            a: 'A strong fit for small systems, retrofit projects, and facilities prioritizing lower installation cost and simple deployment.',
            b: 'A flexible fit for facilities that need reliable coverage, easy expansion, and a balanced wireless nurse call platform.',
            c: 'An integrated fit for larger facilities that want wander management, staff communication, and unified patient safety workflows.'
        };

        const answersEl = document.getElementById('answer-list');
        if (!recommendation) {
            document.getElementById('rec-title').textContent = 'Complete the survey first';
            document.getElementById('rec-copy').textContent = 'Please return to the survey and answer the questions so we can generate your tailored BEC recommendation.';
        } else {
            const winnerTitle = titles[recommendation.winner] || 'BEC Wireless Nurse Call Recommendation';
            document.getElementById('rec-title').textContent = winnerTitle;
            document.getElementById('rec-copy').textContent = descriptions[recommendation.winner] || recommendation.copy || '';
            document.getElementById('fit-score').textContent = recommendation.scores?.a ?? 0;
            document.getElementById('integration-score').textContent = recommendation.scores?.b ?? 0;
            document.getElementById('budget-score').textContent = recommendation.scores?.c ?? 0;

            const labels = {
                facilityType: 'Facility type',
                coverage: 'Coverage need',
                priority: 'Priority',
                decision: 'Purchase stage'
            };

            answersEl.innerHTML = Object.entries(recommendation.answers || {})
                .map(([key, answer]) => `
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
                        <p class="text-sm font-bold text-[var(--bec-ink)]">${labels[key] || key}: ${answer.label}</p>
                        <p class="mt-1 text-sm text-slate-600">${answer.insight}</p>
                    </div>
                `)
                .join('');
        }
    </script>
</body>
</html>
